version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: market_intelligence_minio
    ports:
      - "9000:9000"       # API Port
      - "9001:9001"       # Web Console Port
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: supersecretpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data: